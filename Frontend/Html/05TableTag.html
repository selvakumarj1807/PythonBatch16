<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Tag</title>
</head>

<body>

    <center>
        <h1>Student Information</h1>
    </center>

    <hr>

    <table border="2" cellspacing="20" cellpadding="20" align="center">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Grade</th>
        </tr>

        <tr>
            <td>John Doe</td>
            <td>20</td>
            <td>A</td>
        </tr>

        <tr>
            <td>Jane Smith</td>
            <td>22</td>
            <td>B</td>
        </tr>

        <tr>
            <td>Emily Johnson</td>
            <td>19</td>
            <td>A</td>
        </tr>
    </table>

</body>

</html>
